<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="bg">
      <video autoplay muted loop playsinline>
        <source src="./assets/videos/video.mp4" type="video/mp4" />
      </video>
      <header>
        <p>짱구의 <span>Tic-Tac-Toe</span> 게임</p>
      </header>
      <div class="menu">
        <ul>
          <li class="menu-button" id="start">
            <a href="./game">시작</a>
          </li>
          <!-- tic-tak-toe 규칙 설명 -->
          <!-- cache형식으로 하여 상태 변환 -->
          <li class="menu-button">규칙</li>
        </ul>

        <div id="rule-modal" class="modal-overlay">
          <div class="rule-board">
            <button id="close-btn">&times;</button>
            <h2>🎮 게임 규칙</h2>
            <div class="rule-content">
              <ul>
                <li>
                  <strong>준비:</strong> 3x3 격자판을 준비하고, 두 플레이어는
                  각각 자신의 표식(O 또는 X)을 정합니다.
                </li>
                <li>
                  <strong>진행:</strong> 자신의 차례에 빈칸 중 한 곳을 골라
                  자신의 표식을 남깁니다. 보통 X가 먼저 시작합니다.
                </li>
                <li>
                  <strong>승리 조건:</strong> 가로, 세로, 혹은 대각선 방향으로
                  3개를 가장 먼저 일직선으로 잇는 사람이 승리합니다.
                </li>
                <li>
                  <strong>무승부:</strong> 9칸이 모두 찼음에도 아무도 3개를 잇지
                  못했다면 무승부로 끝납니다.
                </li>
              </ul>
            </div>
          </div>
        </div>
      </div>
      <script src="./js/mainPage.js" type="module"></script>
    </div>
  </body>
</html>
