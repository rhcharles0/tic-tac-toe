<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CS지식 틱택토!</title>
    <style>
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background-image: url('../assets/images/background.png');
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
  font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
}

.game-page {
  width: 100%;
  max-width: 1100px;
  padding: 24px;
}

.turn-panel {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 24px;
  color: #fff;
  text-shadow: 0 2px 4px rgba(0, 0, 0, 0.5);
}

.turn-icon {
  width: 64px;
  height: 64px;
  border-radius: 50%;
  border: 4px solid #fff;
  background: rgba(255, 255, 255, 0.6);
  transition: transform 0.15s ease-out;
}

.turn-icon.is-active {
  animation: turn-bounce 0.7s ease-out infinite alternate;
}

@keyframes turn-bounce {
  from {
    transform: translateY(0);
  }
  to {
    transform: translateY(-4px);
  }
}

.turn-text {
  font-size: 1.6rem;
  font-weight: 700;
}

.game-layout {
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  align-items: center;
  justify-items: center;
}

.character {
  max-height: 260px;
  object-fit: contain;
}

.character-left {
  justify-self: flex-start;
}

.character-right {
  justify-self: flex-end;
}

.character.is-active {
  animation: character-pulse 0.8s ease-in-out infinite alternate,
    character-sway 1.1s ease-in-out infinite alternate;
  transform-origin: bottom center;
}

@keyframes character-pulse {
  from {
    transform: scale(1);
  }
  to {
    transform: scale(1.06);
  }
}

@keyframes character-sway {
  from {
    transform: translateY(0) rotate(0deg);
  }
  50% {
    transform: translateY(-3px) rotate(-1.5deg);
  }
  to {
    transform: translateY(0) rotate(1.5deg);
  }
}


.board-wrapper {
  padding: 16px;
  border-radius: 18px;
  background: rgba(255, 255, 255, 0.1);
  backdrop-filter: blur(10px);
  box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
}

.board-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 16px;
}

.cell {
  width: 120px;
  height: 120px;
  border-radius: 12px;
  border: 4px solid #ffffff;
  background: rgba(255, 255, 255, 0.25);
  backdrop-filter: blur(12px);
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  cursor: pointer;
  transition: transform 0.1s ease-out, background 0.15s ease-out, box-shadow 0.15s ease-out;
}

.cell:hover {
  background: rgba(255, 255, 255, 0.4);
  box-shadow: 0 0 0 3px rgba(255, 255, 255, 0.4);
  transform: translateY(-2px);
}

.cell:active {
  transform: translateY(1px);
}

.cell-number {
  font-size: 2.4rem;
  font-weight: 700;
  color: #ffffff;
  text-shadow: 0 2px 4px rgba(0, 0, 0, 0.6);
}

.cell-piece {
  width: 85%;
  height: 85%;
  object-fit: contain;
}

.quiz-modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.6);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 1000;
}

.quiz-modal-overlay.is-open {
  display: flex;
}

.quiz-modal {
  width: 100%;
  max-width: 520px;
  background: #fff8cf;
  border-radius: 18px;
  border: 4px solid #111;
  box-shadow: 0 18px 40px rgba(0, 0, 0, 0.6);
  padding: 20px 24px 18px;
  font-family: 'Jua', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI',
    sans-serif;
}

.quiz-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 12px;
}

.quiz-title {
  font-size: 1.6rem;
}

.quiz-close-button {
  border: none;
  background: transparent;
  font-size: 1.8rem;
  font-weight: 700;
  cursor: pointer;
}

.quiz-body {
  margin-bottom: 16px;
}

.quiz-actions {
  display: flex;
  gap: 12px;
  justify-content: center;
  margin-top: 16px;
}

.quiz-answer-btn {
  padding: 10px 24px;
  border-radius: 10px;
  border: 2px solid #111;
  font-size: 1rem;
  font-weight: bold;
  cursor: pointer;
  transition: transform 0.1s ease-out, box-shadow 0.1s ease-out;
}

.quiz-answer-btn:first-child {
  background: #4caf50;
  color: #fff;
}

.quiz-answer-btn:last-child {
  background: #f44336;
  color: #fff;
}

.quiz-answer-btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
}

.quiz-answer-btn:active {
  transform: translateY(0);
}

@media (max-width: 900px) {
  .game-page {
    padding: 16px;
  }

  .game-layout {
    grid-template-columns: 1fr;
    row-gap: 24px;
  }

  .character-left,
  .character-right {
    justify-self: center;
  }

  .cell {
    width: 90px;
    height: 90px;
  }
}
    </style>
  </head>
  <body>
    <div class="game-page">
      <div class="turn-panel">
        <img
          id="playerIcon"
          class="turn-icon"
          src="../assets/images/player0.png"
          alt="현재 플레이어 아이콘"
        />
        <span class="turn-text">짱구의 차례</span>
      </div>

      <div class="game-layout">
        <img
          class="character character-left"
          src="../assets/images/player_character.png"
          alt="플레이어 짱구"
        />

        <div class="board-wrapper">
          <div id="board" class="board-grid">
            <button class="cell" data-index="0"><span class="cell-number">1</span></button>
            <button class="cell" data-index="1"><span class="cell-number">2</span></button>
            <button class="cell" data-index="2"><span class="cell-number">3</span></button>
            <button class="cell" data-index="3"><span class="cell-number">4</span></button>
            <button class="cell" data-index="4"><span class="cell-number">5</span></button>
            <button class="cell" data-index="5"><span class="cell-number">6</span></button>
            <button class="cell" data-index="6"><span class="cell-number">7</span></button>
            <button class="cell" data-index="7"><span class="cell-number">8</span></button>
            <button class="cell" data-index="8"><span class="cell-number">9</span></button>
          </div>
        </div>

        <img
          class="character character-right"
          src="../assets/images/cpu_character.png"
          alt="CPU 철수"
        />
      </div>
    </div>

    <div class="quiz-modal-overlay" id="quizModal">
      <div class="quiz-modal">
        <div class="quiz-header">
          <h2 class="quiz-title">퀴즈</h2>
          <button class="quiz-close-button" id="quizCloseBtn" aria-label="퀴즈 닫기">×</button>
        </div>
        <div class="quiz-body" id="quizContent">
        </div>
        <div class="quiz-actions">
          <button type="button" class="quiz-answer-btn" id="quizCorrectBtn">정답</button>
          <button type="button" class="quiz-answer-btn" id="quizWrongBtn">오답</button>
        </div>
      </div>
    </div>

    <script src="script.js" type="module"></script>
  </body>
</html>
