<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CS지식 틱택토!</title>
    <link rel="stylesheet" href="quizPage.css" />
  </head>
  <body>
    <div class="game-page">
      <!-- 현재 턴을 나타내는 아이콘 + 텍스트 -->
      <div class="turn-panel">
        <img
          id="playerIcon"
          class="turn-icon"
          src="../assets/images/player0_mark.png"
          alt="현재 플레이어 아이콘"
        />
        <span class="turn-text">짱구의 차례</span>
      </div>

      <div class="game-layout">
        <!-- 중앙 3x3 틱택토 보드 -->
        <div class="board-wrapper">
          <div id="board" class="board-grid">
            <button class="cell" data-index="0">
              <span class="cell-number"></span>
            </button>
            <button class="cell" data-index="1">
              <span class="cell-number"></span>
            </button>
            <button class="cell" data-index="2">
              <span class="cell-number"></span>
            </button>
            <button class="cell" data-index="3">
              <span class="cell-number"></span>
            </button>
            <button class="cell" data-index="4">
              <span class="cell-number"></span>
            </button>
            <button class="cell" data-index="5">
              <span class="cell-number"></span>
            </button>
            <button class="cell" data-index="6">
              <span class="cell-number"></span>
            </button>
            <button class="cell" data-index="7">
              <span class="cell-number"></span>
            </button>
            <button class="cell" data-index="8">
              <span class="cell-number"></span>
            </button>
          </div>
        </div>
        <button id="resetBtn">Reset</button>
        <img
          class="character character-left"
          src="../assets/images/player0.png"
          alt="플레이어 짱구"
        />
        <img
          class="character character-right"
          src="../assets/images/player1.png"
          alt="CPU 철수"
        />
      </div>
    </div>

    <div id="quiz-modal">
      <div id="modal-content">
        <div id="quiz-header">
          <span id="quiz-subject">과목</span>
          <span id="quiz-type">유형</span>
        </div>
        <h2 id="quiz-question">문제가 여기에 표시됩니다.</h2>
        <div id="quiz-options"></div>
      </div>
    </div>
    <div id="result-modal" class="modal">
      <div class="modal-content">
        <div id="result-header">
          <span id="result-subject">과목</span>
          <span id="result-type">유형</span>
        </div>
        <h2 id="result-title"></h2>
        <p id="result-question"></p>
        <div id="result-options"></div>
        <p id="result-explanation"></p>
        <button id="close-result-modal">닫기</button>
      </div>
    </div>

    <div id="game-end-modal">
      <div id="game-end-modal-content">
        <h1 id="end-modal-title" class="ending-font pulse"></h1>
        <div id="end-modal-content"></div>
        <button id="restartBtn">다시하기</button>
      </div>
    </div>

    <div id="difficulty-modal" class="modal-overlay">
      <div class="difficulty-board">
        <button id="difficulty-close-btn" aria-label="난이도 창 닫기">
          &times;
        </button>
        <h2>난이도를 선택해 주세요</h2>
        <p class="difficulty-subtext">
          난이도에 따라 CPU의 전략이 달라집니다. <br />
          (Easy / Normal / Hard)
        </p>
        <div class="difficulty-buttons">
          <button class="difficulty-button" data-level="easy">
            쉬움 (Easy)
          </button>
          <button class="difficulty-button" data-level="normal">
            보통 (Normal)
          </button>
          <button class="difficulty-button" data-level="hard">
            어려움 (Hard)
          </button>
        </div>
      </div>
    </div>
    <audio
      id="correctSound"
      style="display: none"
      src="../assets/videos/correct-sound-effect2.mp3"
      preload="auto"
    ></audio>
    <audio
      id="wrongSound"
      style="display: none"
      src="../assets/videos/fail-sound-effect.mp3"
      preload="auto"
    ></audio>
    <audio
      id="endingSound"
      style="display: none"
      src="../assets/videos/ending-sound.mp3"
      preload="auto"
    ></audio>

    <script src="../js/game.js" type="module"></script>
  </body>
</html>
