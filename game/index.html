<!doctype html>
<!--
  틱택토 실제 플레이 페이지
  - 좌우 캐릭터(플레이어 짱구 / CPU 철수)와 중앙 3x3 보드를 렌더링
  - 하단에 퀴즈 모달을 띄워 퀴즈를 맞춰야만 말(말판)을 둘 수 있게 구성
  - /game/script.js 에서 게임 로직(턴, 승리 판정, 퀴즈, CPU 착수)을 담당
-->
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CS지식 틱택토!</title>
    <style>
      /* 기본 리셋 및 공통 스타일 */
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background-image: url('../assets/images/background.png');
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
        font-family:
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          'Segoe UI',
          sans-serif;
      }

      .game-page {
        width: 100%;
        max-width: 1100px;
        padding: 24px;
      }

      /* 현재 턴(아이콘 + 텍스트) 표시 영역 */
      .turn-panel {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 24px;
        color: #fff;
        text-shadow: 0 2px 4px rgba(0, 0, 0, 0.5);
      }

      .turn-icon {
        width: 64px;
        height: 64px;
        border-radius: 50%;
        border: 4px solid #fff;
        background: rgba(255, 255, 255, 0.6);
        transition: transform 0.15s ease-out;
      }

      .turn-icon.is-active {
        animation: turn-bounce 0.7s ease-out infinite alternate;
      }

      @keyframes turn-bounce {
        from {
          transform: translateY(0);
        }
        to {
          transform: translateY(-4px);
        }
      }

      .turn-text {
        font-size: 1.6rem;
        font-weight: 700;
      }

      /* 좌측/보드/우측 캐릭터를 3열 그리드로 배치 */
      .game-layout {
        display: grid;
        grid-template-columns: 1fr auto 1fr;
        align-items: center;
        justify-items: center;
      }

      .character {
        max-height: 260px;
        object-fit: contain;
      }

      .character-left {
        justify-self: flex-start;
      }

      .character-right {
        justify-self: flex-end;
      }

      .character.is-active {
        animation:
          character-pulse 0.8s ease-in-out infinite alternate,
          character-sway 1.1s ease-in-out infinite alternate;
        transform-origin: bottom center;
      }

      @keyframes character-pulse {
        from {
          transform: scale(1);
        }
        to {
          transform: scale(1.06);
        }
      }

      @keyframes character-sway {
        from {
          transform: translateY(0) rotate(0deg);
        }
        50% {
          transform: translateY(-3px) rotate(-1.5deg);
        }
        to {
          transform: translateY(0) rotate(1.5deg);
        }
      }

      /* 틱택토 보드 주변 카드 스타일 */
      .board-wrapper {
        padding: 16px;
        border-radius: 18px;
        background: rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(10px);
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
      }

      /* 3 x 3 보드 그리드 */
      .board-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 16px;
      }

      /* 각 칸(버튼) 스타일 */
      .cell {
        width: 120px;
        height: 120px;
        border-radius: 12px;
        border: 4px solid #ffffff;
        background: rgba(255, 255, 255, 0.25);
        backdrop-filter: blur(12px);
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
        cursor: pointer;
        transition:
          transform 0.1s ease-out,
          background 0.15s ease-out,
          box-shadow 0.15s ease-out;
      }

      .cell:hover {
        background: rgba(255, 255, 255, 0.4);
        box-shadow: 0 0 0 3px rgba(255, 255, 255, 0.4);
        transform: translateY(-2px);
      }

      .cell:active {
        transform: translateY(1px);
      }

      .cell-number {
        font-size: 2.4rem;
        font-weight: 700;
        color: #ffffff;
        text-shadow: 0 2px 4px rgba(0, 0, 0, 0.6);
      }

      .cell-piece {
        width: 85%;
        height: 85%;
        object-fit: contain;
      }

      /* 퀴즈 모달 전체 오버레이 */
      .quiz-modal-overlay {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.6);
        display: none;
        align-items: center;
        justify-content: center;
        z-index: 1000;
      }

      .quiz-modal-overlay.is-open {
        display: flex;
      }

      /* 퀴즈 내용 박스 */
      .quiz-modal {
        width: 100%;
        max-width: 520px;
        background: #fff8cf;
        border-radius: 18px;
        border: 4px solid #111;
        box-shadow: 0 18px 40px rgba(0, 0, 0, 0.6);
        padding: 20px 24px 18px;
        font-family:
          'Jua',
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          'Segoe UI',
          sans-serif;
      }

      .quiz-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 12px;
      }

      .quiz-title {
        font-size: 1.6rem;
      }

      .quiz-close-button {
        border: none;
        background: transparent;
        font-size: 1.8rem;
        font-weight: 700;
        cursor: pointer;
      }

      .quiz-body {
        margin-bottom: 16px;
      }

      .quiz-actions {
        display: flex;
        gap: 12px;
        justify-content: center;
        margin-top: 16px;
      }

      .quiz-answer-btn {
        padding: 10px 24px;
        border-radius: 10px;
        border: 2px solid #111;
        font-size: 1rem;
        font-weight: bold;
        cursor: pointer;
        transition:
          transform 0.1s ease-out,
          box-shadow 0.1s ease-out;
      }

      .quiz-answer-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
      }

      .quiz-answer-btn:active {
        transform: translateY(0);
      }

      @media (max-width: 900px) {
        .game-page {
          padding: 16px;
        }

        .game-layout {
          grid-template-columns: 1fr;
          row-gap: 24px;
        }

        .character-left,
        .character-right {
          justify-self: center;
        }

        .cell {
          width: 90px;
          height: 90px;
        }
      }

      /* 게임 종료 스타일*/
      @font-face {
        font-family: "OkMallang";
        src: url("../assets/font/Ok_Mallang_B.ttf") format("truetype");
      }

      /* title 폰트 */
      .ending-font {
        font-family: "OkMallang", sans-serif;
        font-size: 100px;
        font-weight: 800;
        line-height: 1.05;
        letter-spacing: -4px;
        text-align: center;

        color: #FDC135;

        /* 글자 테두리 */
        -webkit-text-stroke: 2.3px #000;

        margin-top: 0;
      }

      /* button css */
      #restartBtn {
        margin: 5px auto;
        display: block;
        padding: 10px 20px;
        font-size: 16px;
        font-weight: bold;
        color: #000;
        background-color: #FDC135;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        width: 100px;
      }

      /* img size */
      .img-size {
        width: 220px;
      }

      /* 승리 css */
      .win {
        display: flex;

        padding-top: 100px;
      }

      /* 승리 말풍선 */
      #result-text-div {
        background-image: url("../assets/images/Speech_bubble.png");
        background-size: 300px;
        background-repeat: no-repeat;
        background-position: center;
        position: absolute;
        top: 33%;
        left: 48%;
        width: 350px;
        height: 300px;
      }

      /* 승리 말풍선 텍스트 */
      #result-text {
        position: absolute;
        top: 35%;
        left: 50%;
        transform: translate(-50%, -50%);
        text-align: center;
      }


      /* 무승부 css */
      .draw {
        display: flex;
        justify-content: center;  /* 가로 가운데 */
        align-items: center;      /* 세로 가운데 */
        gap: 40px;                /* 요소 간 간격 */
      }

      /* 무승부 말풍선 */
      #result-text-div-draw {
        position: absolute;
        left: 17%;
        top: -100%;
      }

      /* 무승부 말풍선 텍스트*/
      #result-text-draw {
        background-image: url("../assets/images/draw_bubble.png");
        background-size: 300px;
        background-repeat: no-repeat;
        background-position: center;

        height: 300px;
        width: 350px;

        display: flex;
        justify-content: center;  /* 가로 가운데 */
        align-items: center;      /* 세로 가운데 */

        text-align: center;
        font-size: 24px;
      }

      /* 커졌다 작아졌다 */
      .pulse {
        animation: pulse 1s infinite ease-in-out;
      }

      @keyframes pulse {
        0% { transform: scale(1); }
        40% { transform: scale(1.25); }
        70% { transform: scale(0.95); }
        100% { transform: scale(1); }
      }

      /* 좌우로 움직이기 */
      .move {
        /*width: 200px;*/
        animation: moveSide 1s infinite ease-in-out;
      }

      @keyframes moveSide {
        0% {
          transform: translateX(0);
        }
        50% {
          transform: translateX(10px);
          transform: translateY(10px);
        }
        100% {
          transform: translateX(0);
        }
      }
    </style>
  </head>
  <body>
    <div class="game-page">
      <!-- 현재 턴을 나타내는 아이콘 + 텍스트 -->
      <div class="turn-panel">
        <img
          id="playerIcon"
          class="turn-icon"
          src="../assets/images/player0.png"
          alt="현재 플레이어 아이콘"
        />
        <span class="turn-text">짱구의 차례</span>
      </div>

      <div class="game-layout">
        <img
          class="character character-left"
          src="../assets/images/player_character.png"
          alt="플레이어 짱구"
        />

        <!-- 중앙 3x3 틱택토 보드 -->
        <div class="board-wrapper">
          <div id="board" class="board-grid">
            <button class="cell" data-index="0">
              <span class="cell-number">1</span>
            </button>
            <button class="cell" data-index="1">
              <span class="cell-number">2</span>
            </button>
            <button class="cell" data-index="2">
              <span class="cell-number">3</span>
            </button>
            <button class="cell" data-index="3">
              <span class="cell-number">4</span>
            </button>
            <button class="cell" data-index="4">
              <span class="cell-number">5</span>
            </button>
            <button class="cell" data-index="5">
              <span class="cell-number">6</span>
            </button>
            <button class="cell" data-index="6">
              <span class="cell-number">7</span>
            </button>
            <button class="cell" data-index="7">
              <span class="cell-number">8</span>
            </button>
            <button class="cell" data-index="8">
              <span class="cell-number">9</span>
            </button>
          </div>
        </div>

        <img
          class="character character-right"
          src="../assets/images/cpu_character.png"
          alt="CPU 철수"
        />
      </div>
    </div>

    <div class="quiz-modal-overlay" id="quizModal">
      <div class="quiz-modal">
        <div class="quiz-header">
          <h2 class="quiz-title">퀴즈</h2>
          <button
            class="quiz-close-button"
            id="quizCloseBtn"
            aria-label="퀴즈 닫기"
          >
            ×
          </button>
        </div>
        <div class="quiz-body" id="quizContent"></div>
      </div>
    </div>

    <div class="quiz-modal-overlay" id="game-end-modal">
      <div id="game-end-modal-content">
        <h1 id="end-modal-title" class="ending-font pulse"></h1>
        <div id="end-modal-content"></div>
        <button id="restartBtn">다시하기</button>
      </div>
    </div>

    <audio id="correctSound" style="display: none" src="../assets/videos/correct-sound-effect2.mp3" preload="auto"></audio>
    <audio id="wrongSound" style="display: none" src="../assets/videos/fail-sound-effect.mp3" preload="auto"></audio>
    <audio id="endingSound" style="display: none" src="../assets/videos/ending-sound.mp3" preload="auto"></audio>

    <script src="script.js" type="module"></script>
  </body>
</html>
